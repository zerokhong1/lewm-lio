defaults:
  - _self_

model:
  encoder:
    type: bev_cnn
    in_channels: 4
    latent_dim: 192
    base_channels: 32
  predictor:
    type: mlp
    hidden_dim: 512
    num_layers: 3
    dropout: 0.1
  action_dim: 3           # (dx, dy, dyaw) cho navigation

training:
  batch_size: 64
  max_steps: 50000
  lr: 3e-4
  weight_decay: 1e-4
  sigreg_lambda: 1.0
  sigreg_num_slices: 1024
  device: cuda

data:
  dataset: nuscenes_bev
  path: ${oc.env:LEWM_DATA_DIR}/processed/nuscenes_bev_train.h5
  seq_length: 16
  img_size: [256, 256]

logging:
  backend: tensorboard
  log_dir: ${oc.env:LEWM_PROJECT_DIR}/outputs/logs

checkpoint:
  save_dir: ${oc.env:LEWM_PROJECT_DIR}/outputs/checkpoints
  save_every: 5000
